<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>2026 연암공과대학교 해커톤 팀 추첨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <header>
    <div class="hdr-left">
      <span class="hdr-school">연암공과대학교</span>
      <span class="hdr-div">·</span>
      <span class="hdr-eng">YEONAM UNIV. OF SCIENCE AND TECHNOLOGY</span>
    </div>
    <div class="hdr-right">
      <span class="hdr-year">2026</span>
      <span class="hdr-title">해커톤 팀 추첨</span>
    </div>
  </header>

  <main>

    <!-- 시드 패널 -->
    <aside id="seed-panel">
      <div class="sp-block">
        <div class="sp-label">Seed</div>
        <div id="seed-value">—</div>
      </div>

      <div class="sp-sep"></div>

      <div class="sp-block">
        <div class="sp-label">현재 시각</div>
        <div id="seed-time">--:--:--.---</div>
      </div>

      <div class="sp-sep"></div>

      <div id="seed-status"></div>

      <div class="sp-sep"></div>

      <p class="sp-hint">
        추첨 버튼을 누른 순간의<br>
        시드로 팀을 배정합니다.<br><br>
        동일 시드 입력 시<br>
        동일한 결과가 재현됩니다.
      </p>
    </aside>

    <!-- 추첨 섹션 -->
    <div id="draw-section">

      <div class="info-bar">
        <div class="section-label">팀장 — 사전 확정</div>
        <div id="leaders-strip"></div>
      </div>

      <div id="pool-box">
        <div class="section-label">팀원 29명 — 추첨 대상</div>
        <div id="member-pool"></div>
      </div>

      <button id="btn-draw">추첨 시작</button>

    </div>

    <!-- 결과 섹션 -->
    <div id="result-section">

      <div id="seed-bar">
        <div class="sb-left">
          <span class="sb-label">시드</span>
          <span id="frozen-seed"></span>
          <button id="btn-copy">복사</button>
        </div>
        <a id="verify-link" href="verify.html" target="_blank">검증 페이지에서 재현 →</a>
      </div>

      <div id="team-grid"></div>

      <div id="card-deck">
        <div class="section-label">섞인 카드 — 대기 중</div>
      </div>

    </div>

  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/fair.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
